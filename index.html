<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MF35X Live Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>🚜 MF35X Live Tracker</header>

  <main>
    <section class="cards">
      <div class="card">
        <div class="label">Status</div>
        <div class="value" id="status">Warte...</div>
      </div>

      <div class="card">
        <div class="label">Geschwindigkeit</div>
        <div class="value"><span id="speed">0</span> km/h</div>
      </div>

      <div class="card">
        <div class="label">Satelliten</div>
        <div class="value" id="sat">0</div>
      </div>

     
    </section>

    <section id="map"></section>

    <a id="mapsButton" class="button" href="#" target="_blank">
      📍 In Google Maps öffnen
    </a>

    <div class="footer">
      Letztes Update: <span id="lastUpdate">---</span>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
