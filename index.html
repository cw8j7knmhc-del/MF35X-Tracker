<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MF35X Live Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <div class="title">🚜 MF35X Live Tracker</div>
  </header>

  <main>
    <section class="cards">

      <div class="card">
        <div class="label">Status</div>
        <div class="icon status-dot" id="statusDot"></div>
        <div class="value" id="status">Warte...</div>
        <div class="subvalue">Letztes Update: <span id="lastUpdateSmall">---</span></div>
      </div>

      <div class="card">
        <div class="label">Geschwindigkeit</div>
        <div class="icon blue">🏎️</div>
        <div class="value"><span id="speed">---</span> km/h</div>
      </div>

      <div class="card">
        <div class="label">Satelliten</div>
        <div class="icon purple">🛰️</div>
        <div class="value" id="sat">---</div>
      </div>

      <div class="card">
        <div class="label">Batteriespannung</div>
        <div class="icon green">🔋</div>
        <div class="value"><span id="battery">---</span> V</div>
      </div>

      <div class="card">
        <div class="label">Drehzahl</div>
        <div class="icon yellow">🧭</div>
        <div class="value"><span id="rpm">---</span> u/min</div>
      </div>

      <div class="card">
        <div class="label">Öldruck</div>
        <div class="icon orange">⏲️</div>
        <div class="value"><span id="oilpressure">---</span> bar</div>
      </div>

      <div class="card">
        <div class="label">Öltemperatur</div>
        <div class="icon red">🌡️</div>
        <div class="value"><span id="oiltemp">---</span> °C</div>
      </div>

      <div class="card">
        <div class="label">Zylindertemperatur</div>
        <div class="icon red">🔥</div>
        <div class="value"><span id="cyltemp">---</span> °C</div>
      </div>

    </section>

    <section id="map"></section>

    <a id="mapsButton" class="button disabled" href="#" target="_blank">
      📍 In Google Maps öffnen
    </a>

    <div class="footer">
      Tracker V5 · vorbereitet für Motor- und GPS-Daten
    </div>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
